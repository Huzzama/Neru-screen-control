name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Extract version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3 python3-pip python3-venv \
            debhelper devscripts build-essential \
            imagemagick wget libusb-1.0-0-dev \
            libfuse2

      - name: Generate multi-size icons
        run: |
          for size in 16 32 48 64 128 256; do
            mkdir -p packaging/shared/icons/${size}x${size}
            convert icon.png -resize ${size}x${size} \
              packaging/shared/icons/${size}x${size}/neru-screen-control.png
          done

      - name: Build AppImage
        env:
          NSC_VERSION: ${{ env.VERSION }}
        run: bash packaging/appimage/build-appimage.sh

      - name: Build .deb package
        run: |
          cp -r packaging/debian debian
          dpkg-buildpackage -us -uc -b
          mv ../neru-screen-control_*.deb .

      - name: Generate checksums
        run: |
          sha256sum \
            neru-screen-control-*.AppImage \
            neru-screen-control_*.deb \
            > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Neru Screen Control v${{ env.VERSION }}"
          body: |
            ## Neru Screen Control v${{ env.VERSION }}

            ### Downloads
            | File | For |
            |------|-----|
            | `neru-screen-control-${{ env.VERSION }}-x86_64.AppImage` | Any Linux distro (universal) |
            | `neru-screen-control_${{ env.VERSION }}_all.deb` | Ubuntu, Mint, Debian, Pop!_OS |

            ### Install
            **AppImage (any distro):**
            ```bash
            chmod +x neru-screen-control-*.AppImage
            ./neru-screen-control-*.AppImage --ui
            ```
            **Debian/Ubuntu/Mint:**
            ```bash
            sudo dpkg -i neru-screen-control_*.deb
            sudo apt-get install -f
            ```
            **Arch Linux (AUR):**
            ```bash
            yay -S neru-screen-control
            ```

            ### Verify
            ```bash
            sha256sum -c SHA256SUMS.txt
            ```
          generate_release_notes: true
          files: |
            neru-screen-control-*.AppImage
            neru-screen-control_*.deb
            SHA256SUMS.txt